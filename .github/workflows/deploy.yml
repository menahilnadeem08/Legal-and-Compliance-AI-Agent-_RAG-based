name: CI/CD Deployment to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            set -e   # 🚀 Stop immediately if any command fails

            APP_DIR="/home/${{ secrets.EC2_USER }}/app"

            mkdir -p $APP_DIR
            cd $APP_DIR

            # -------------------------------
            # Pull latest code
            # -------------------------------
            if [ -d ".git" ]; then
              git fetch origin master
              git reset --hard origin/master
            else
              git clone -b master https://github.com/menahilnadeem08/Legal-and-Compliance-AI-Agent-_RAG-based.git .
            fi

            # ====================================================
            # BACKEND
            # ====================================================
            cd $APP_DIR/backend

            cat > .env << 'ENVFILE'
            PORT=3001
            NODE_ENV=production
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            GMAIL_USER=${{ secrets.GMAIL_USER }}
            GMAIL_PASSWORD=${{ secrets.GMAIL_PASSWORD }}
            APP_URL=${{ secrets.APP_URL }}
            NODE_TLS_REJECT_UNAUTHORIZED=0
            EASYOCR_URL=http://localhost:8001
            ENVFILE

            # Install only if node_modules missing
            if [ ! -d "node_modules" ]; then
              npm ci
            fi

            npm run build

            pm2 delete backend 2>/dev/null || true
            pm2 start dist/index.js --name backend

            # ====================================================
            # OCR SERVICE
            # ====================================================
            cd $APP_DIR/ocr-service

            if [ ! -d ".venv" ]; then
              python3 -m venv .venv
              .venv/bin/pip install -r requirements.txt
            fi

            pm2 delete ocr-service 2>/dev/null || true
            pm2 start ".venv/bin/python -m uvicorn main:app --host 0.0.0.0 --port 8001" \
              --name ocr-service --cwd $APP_DIR/ocr-service

            # ====================================================
            # FRONTEND (Next.js with pnpm)
            # ====================================================
            cd $APP_DIR/new-ui

            corepack enable
            corepack prepare pnpm@latest --activate

            if [ ! -d "node_modules" ]; then
              pnpm install --frozen-lockfile
            fi

            pnpm run build

            pm2 delete new-ui 2>/dev/null || true
            pm2 start "pnpm start" --name new-ui

            # ====================================================
            # SAVE PM2 STATE
            # ====================================================
            pm2 save